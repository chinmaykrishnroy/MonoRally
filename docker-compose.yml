services:
  monorally:
    build:
      context: .
    image: monorally:local
    container_name: monorally
    env_file:
      - .env
    ports:
      - "${APP_HOST_PORT:-18787}:${PORT:-8787}"
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || 8787) + '/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
